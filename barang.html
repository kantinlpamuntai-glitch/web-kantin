
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Barang</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <button onclick="location.href='master.html'" class="back-btn">
        ← Master Data
    </button>

    <h1>📦 Master Barang</h1>

    <div class="form-box grid-form">

        <div class="input-group">
            <label>Kode Barang</label>
            <input type="text" id="kode">
        </div>

        <div class="input-group">
            <label>Nama Barang</label>
            <input type="text" id="nama">
        </div>

        <div class="input-group">
            <label>Harga Beli</label>
            <input type="number" id="hargaBeli">
        </div>

        <div class="input-group">
            <label>Harga Jual</label>
            <input type="number" id="hargaJual">
        </div>

        <div class="input-group">
            <label>Stok Awal</label>
            <input type="number" id="stok">
        </div>

        <button id="simpanBarang">
            Simpan Barang
        </button>

    </div>

    <table>
        <thead>
            <tr>
                <th>Kode</th>
                <th>Nama Barang</th>
                <th>Harga Beli</th>
                <th>Harga Jual</th>
                <th>Stok</th>
            </tr>
        </thead>

        <tbody id="tabelBarang">

        </tbody>
    </table>

</div>

<script src="barang.js"></script>

</body>
</html>
