<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laporan Mutasi BRILink</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    color:#FFD700;
    font-family:Arial,sans-serif;
}

.container{
    width:95%;
    margin:auto;
    padding:20px;
}

.back-btn{
    background:#FFD700;
    color:#000;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    margin-bottom:20px;
}

h1{
    margin-bottom:20px;
}

.filter-box{
    background:#1c1c1c;
    border:1px solid #FFD700;
    border-radius:10px;
    padding:15px;
    margin-bottom:20px;
}

input{
    padding:10px;
    border:1px solid #FFD700;
    border-radius:5px;
    background:#000;
    color:#FFD700;
    margin-right:10px;
}

.btn{
    background:#FFD700;
    color:#000;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

.table-container{
    overflow-x:auto;
    margin-top:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#1c1c1c;
}

th{
    background:#FFD700;
    color:#000;
    padding:12px;
}

td{
    border:1px solid #333;
    padding:10px;
    text-align:center;
    color:white;
}

tr:nth-child(even){
    background:#181818;
}

</style>

</head>
<body>

<div class="container">

<button class="back-btn"
onclick="location.href='/'">
🏠 Dashboard
</button>

</button>

<h1>🏦 LAPORAN MUTASI BRILINK</h1>

<div class="filter-box">

<label>Tanggal Awal :</label>

<input
type="text"
id="tglAwal">

<label>Tanggal Akhir :</label>

<input
type="text"
id="tglAkhir">

<button
class="btn"
onclick="tampilkanData()">

Tampilkan

</button>
<button
class="btn"
onclick="exportExcel()">

📥 Export Excel

</button>
</div>

<div class="table-container">

<table>

<thead>

<tr>

<th>Tanggal Transaksi</th>
<th>Keterangan</th>
<th>Nominal</th>
<th>Admin</th>

</tr>

</thead>

<tbody id="bodyMutasi">

</tbody>

</table>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>

flatpickr("#tglAwal",{
    dateFormat:"Y-m-d",
    defaultDate:"today"
});

flatpickr("#tglAkhir",{
    dateFormat:"Y-m-d",
    defaultDate:"today"
});

async function tampilkanData(){

    let tglAwal =
        document.getElementById("tglAwal").value;

    let tglAkhir =
        document.getElementById("tglAkhir").value;

    const response =
        await fetch(
            `/data_mutasi_brilink?tgl_awal=${tglAwal}&tgl_akhir=${tglAkhir}`
        );

    const data =
        await response.json();

    let tbody =
        document.getElementById("bodyMutasi");

    tbody.innerHTML = "";

    data.forEach(item => {

        tbody.innerHTML += `
        <tr>

            <td>${item.tanggal}</td>

            <td>${item.keterangan}</td>

            <td>
                Rp ${item.nominal.toLocaleString("id-ID")}
            </td>

            <td>
                Rp ${item.admin.toLocaleString("id-ID")}
            </td>

        </tr>
        `;

    });

}

</script>
<script>

function exportExcel(){

    let tglAwal =
        document.getElementById("tglAwal").value;

    let tglAkhir =
        document.getElementById("tglAkhir").value;

    window.location.href =
        `/export_mutasi_brilink?tgl_awal=${tglAwal}&tgl_akhir=${tglAkhir}`;

}

</script>
</body>
</html>
